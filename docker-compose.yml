version: '3.8'

services:
  qdrant:
    image: qdrant/qdrant:latest
    container_name: qdrant-officebanao
    ports:
      - '6333:6333'
    environment:
      - QDRANT_API_KEY=${QDRANT_API_KEY:-your_qdrant_api_key}
    volumes:
      - qdrant_storage:/qdrant/storage
    healthcheck:
      test: ['CMD', 'curl', '-f', 'http://localhost:6333/health']
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - officebanao-network

  redis:
    image: redis:7-alpine
    container_name: redis-officebanao
    ports:
      - '6379:6379'
    volumes:
      - redis_data:/data
    networks:
      - officebanao-network

volumes:
  qdrant_storage:
  redis_data:

networks:
  officebanao-network:
    driver: bridge